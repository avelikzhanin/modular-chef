name: modular_chef
description: Modular Chef — мил-преп с двумя ролями (Шеф и Гость).
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Navigation
  go_router: ^14.0.0

  # HTTP client (Stage 5: HttpMenuGenerator → Railway backend)
  dio: ^5.7.0

  # State management
  provider: ^6.1.0

  # Typography (Inter via Google Fonts)
  google_fonts: ^6.1.0

  # Images
  cached_network_image: ^3.3.1

  # SVG icons
  flutter_svg: ^2.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/
    - assets/images/
    - assets/prompts/
