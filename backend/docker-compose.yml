services:
  postgres:
    image: postgres:16-alpine
    container_name: modular_chef_db
    environment:
      POSTGRES_USER: chef
      POSTGRES_PASSWORD: chef
      POSTGRES_DB: modular_chef
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chef -d modular_chef"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
